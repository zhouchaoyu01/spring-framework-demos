spring:
  application:
    name: coupon-service
  datasource:
    url: jdbc:mysql://localhost:3306/test_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  data:
    redis:
      # Redis数据库索引（默认为0）
      database: 13
      # Redis服务器地址
      host: 192.168.14.245
      # Redis服务器连接端口
      port: 16379
      # Redis服务器连接密码（默认为空）
      password: otmsredis
      # 连接超时时间（毫秒）
      connect-timeout: 5000
      lettuce:
        pool:
          # 连接池最大连接数（使用负值表示没有限制）
          max-active: 8
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1
          # 连接池中的最大空闲连接
          max-idle: 8
redisson:
  singleServerConfig:
    address: redis://192.168.26.143:6379
    database: 13
    connectionMinimumIdleSize: 10
    connectionPoolSize: 64
    idleConnectionTimeout: 10000
    connectTimeout: 10000
    timeout: 3000
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.coupon.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8098
  servlet:
    context-path: /



