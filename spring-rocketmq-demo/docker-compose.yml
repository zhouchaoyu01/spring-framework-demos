version: '3.8'

services:
  # RocketMQ NameServer
  namesrv:
    image: apache/rocketmq:5.3.2
    container_name: rocketmq-namesrv
    ports:
      - "9876:9876"
    volumes:
      - ./rocketmq/logs/namesrv:/home/rocketmq/logs
      - ./rocketmq/store/namesrv:/home/rocketmq/store
    environment:
      - JAVA_OPT_EXT=-Xms512m -Xmx512m -Xmn256m
    command: sh mqnamesrv
    networks:
      - rocketmq-network

  # RocketMQ Broker
  broker:
    image: apache/rocketmq:5.3.2
    container_name: rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf
      - ./rocketmq/logs/broker:/home/rocketmq/logs
      - ./rocketmq/store/broker:/home/rocketmq/store
    environment:
      - JAVA_OPT_EXT=-Xms1g -Xmx1g -Xmn512m
      - NAMESRV_ADDR=namesrv:9876
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    depends_on:
      - namesrv
    networks:
      - rocketmq-network

  # RocketMQ Dashboard
  dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rocketmq-dashboard
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=namesrv:9876
      - server.port=8080
    depends_on:
      - namesrv
      - broker
    networks:
      - rocketmq-network

networks:
  rocketmq-network:
    driver: bridge